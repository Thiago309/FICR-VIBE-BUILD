version: '3.8'

services:
  postgres_db:
    image: postgres:15-alpine
    container_name: lgpd_shield_db
    restart: always
    environment:
      POSTGRES_USER: lgpd_admin
      POSTGRES_PASSWORD: lgpd_secure_password
      POSTGRES_DB: lgpd_shield
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  postgres_data:
